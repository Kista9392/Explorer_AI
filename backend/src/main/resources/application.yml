spring:
  application:
    name: explorer-backend
  
  # Database Connection (H2 default, PostgreSQL if provided)
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:explorer;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # Hibernate Settings
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: false

server:
  port: ${PORT:7860}
  error:
    include-message: always

app:
  # Google Gemini API key configuration
  gemini-api-key: ${GEMINI_API_KEY:not-set}
  youtube-api-key: ${YOUTUBE_API_KEY:${app.gemini-api-key:not-set}}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
